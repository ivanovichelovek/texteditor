name: Claude Review

# Ревью запускается автоматически при открытии PR и при каждом новом пуше в него.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Механику ревью (чтение диффа, постинг инлайн-комментариев) выполняет плагин
# code-review; персона задаётся через --append-system-prompt и .github/review-persona.md.
permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: |
            --append-system-prompt "Веди код-ревью строго в стиле из файла .github/review-persona.md — прочитай его первым делом (Read). Смешивай манеры ревьюеров с приоритетом Олег > Артём > Яишенка > Соня. Пиши по-русски, кратко и по делу; каждому замечанию ставь severity-тег [CRITICAL]/[MAJOR]/[MINOR]/[tidy]; в конце дай сводную таблицу и вердикт. Ничего не мёржи и не пушь."
            --model claude-sonnet-5
            --max-turns 30
